<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#0f172a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="SyncX Pro" />

    <title>SyncX Pro — Fleet document capture for trucking</title>
    <meta name="description" content="Drivers scan a POD, BOL, or lumper receipt from their phone. SyncX Pro crops it, stamps the location, turns it into a PDF, and emails it to the right department automatically." />

    <!-- Link previews (WhatsApp, LinkedIn, iMessage) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="SyncX Pro" />
    <meta property="og:title" content="SyncX Pro — the paperwork beats the truck home" />
    <meta property="og:description" content="Your driver scans a signed POD at the dock. Sixty seconds later it's a clean PDF in the right inbox — not riding around in the cab until Thursday." />
    <meta name="twitter:card" content="summary_large_image" />

    <link rel="manifest" href="/manifest.json" />
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
      html, body { overscroll-behavior-y: none; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: #f1f5f9;
        padding-top: env(safe-area-inset-top);
        padding-bottom: env(safe-area-inset-bottom);
      }
      /* NOTE: #root must NOT be width-capped. Each page sets its own width —
         the marketing site and the desktop portals are full-bleed, while the
         driver app and mobile layouts centre themselves. A cap here silently
         clamps every layout in the app. */
      #root { min-height: 100vh; }
      input, select, textarea, button { font-family: inherit; }
      a { color: inherit; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
